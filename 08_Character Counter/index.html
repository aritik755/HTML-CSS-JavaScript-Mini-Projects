<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Character Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Real-Time Character Counter</h1>
    <textarea class="textArea" id="textArea" placeholder="Please write your text here..." maxlength="50"></textarea>
    <div class="counterContainer">
      <p>
        Total Characters: 
        <span class="totalCounter" id="totalCounter"></span>
      </p>
      <p>
        Remaining: 
        <span class="remainingCounter" id="remainingCounter"></span>
      </p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
