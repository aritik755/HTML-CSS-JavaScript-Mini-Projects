<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Loan Calculator</h1>
    <p>
      Loan Amount ₹
      <input class="input" type="number" value="10000" id="loanAmount">
    </p>
    <p>
      Interest Rate %
      <input class="input" type="number" value="8" id="interestRate">
    </p>
    <p>
      Months to pay
      <input class="input" type="number" value="12" id="payPeriod">
    </p>
    <button>Calculate</button>
    <div class="payment">Monthly Payment: <span id="result"></span></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
