<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="heading">Body Mass Index (BMI) Calculator</h1>
      Your Height (cm):
      <input id="input1" class="inputTag" type="number" placeholder="Enter your height in cm">
      Your Weight (kg):
      <input id="input2" class="inputTag" type="number" placeholder="Enter your weight in kg">
      <button>Compute BMI</button>
      <input id="inputView" class="inputTag" type="number" placeholder="0" readonly>
      <label class="condition">Weight Condition: <span id="result"></span></label>
  </div>
  <script src="script.js"></script>
</body>
</html>
